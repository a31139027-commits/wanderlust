</div>
<div class="space-y-2">
<label class="px-4 text-xs font-bold tracking-widest uppercase text-on-surface-variant/60" for="password">Password</label>
<input class="w-full px-6 py-4 rounded-full bg-surface-container border-none focus:bg-surface-container-lowest focus:ring-0 transition-all placeholder:text-on-surface-variant/30 text-on-surface" id="password" placeholder="••••••••" type="password"/>

</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:opacity-70 transition-opacity" href="forgot-password.html">Forgot Password?</a>
</div>
<button class="peach-gradient w-full py-5 rounded-full text-white font-headline font-bold tracking-wide shadow-lg hover:opacity-90 transition-all active:scale-[0.98]" type="submit">
                        Log In
                    </button>

<div class="text-sm text-on-surface-variant/70 -mt-1 px-4">

<span class="text-xs font-bold tracking-widest text-on-surface-variant/40 uppercase">Or continue with</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
