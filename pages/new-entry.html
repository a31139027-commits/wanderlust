<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wanderlust - Log a Stop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/tailwind.config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../assets/shared.css" rel="stylesheet"/>
<style>
  .chip-row input[type="radio"] { display: none; }
  .chip-row input[type="radio"]:checked + label { background-color: #dcae96; color: #fff; }
  .material-symbols-outlined { font-family: 'Material Symbols Outlined' !important; }
  .block-card { animation: slideIn .2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  input:focus, textarea:focus { outline: none; }
  .type-pick-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen pb-36">

<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-[#FDF8F5]/90 backdrop-blur-xl">
  <div class="flex items-center justify-between px-6 py-4 max-w-3xl mx-auto">
    <a href="journal.html" class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container text-primary hover:bg-surface-container-high transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <a href="../index.html" class="font-headline font-extrabold tracking-[0.2em] text-lg text-primary" translate="no">WANDERLUST</a>
    <div class="w-10"></div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 pt-8">

  <div class="mb-8">
    <h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-2">Plan Your Day</h2>
    <p class="text-on-surface-variant font-medium">Add cards to <span class="text-primary font-semibold">Autumn Japan Trip</span></p>
  </div>

  <!-- Source toggle -->
  <div class="flex gap-2 mb-8 bg-surface-container rounded-full p-1">
    <button id="tab-saved" onclick="showTab('saved')" type="button"
      class="flex-1 py-3 rounded-full text-sm font-bold transition-all bg-primary text-white shadow">
      <span class="material-symbols-outlined text-base align-middle" translate="no">favorite</span> From Saved
    </button>
    <button id="tab-manual" onclick="showTab('manual')" type="button"
      class="flex-1 py-3 rounded-full text-sm font-bold transition-all text-on-surface-variant">
      <span class="material-symbols-outlined text-base align-middle" translate="no">add_box</span> Build Entry
    </button>
  </div>

  <!-- FROM SAVED panel -->
  <div id="panel-saved" class="mb-8">
    <div class="relative mb-4">
      <input id="saved-search" type="text" placeholder="Search your saved places…"
        oninput="filterSaved(this.value)"
        class="w-full h-13 pl-12 pr-5 rounded-full bg-surface-container border-none focus:bg-surface-container-lowest focus:ring-0 transition-all placeholder:text-on-surface-variant/30"/>
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant" translate="no">search</span>
    </div>
    <div id="saved-list" class="space-y-3"></div>
    <p id="saved-empty" class="hidden text-center text-on-surface-variant py-8 text-sm">No saved places match.</p>
  </div>

  <!-- BUILD ENTRY panel -->
  <div id="panel-manual" class="hidden space-y-6">

    <!-- Day selector (shared) -->
    <div class="space-y-3">
      <label class="block text-xs font-bold tracking-widest uppercase text-on-surface-variant/60 ml-1">Add to Day</label>
      <div id="day-btn-row" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
      <input type="hidden" id="selected-day" value="1"/>
    </div>

    <!-- Blocks list -->
    <div id="blocks-list" class="space-y-4"></div>

    <!-- Add card type picker -->
    <div id="type-picker" class="rounded-[2rem] bg-surface-container/60 p-5">
      <p class="text-xs font-bold tracking-widest uppercase text-on-surface-variant/60 mb-4 ml-1">Add a Card</p>
      <div class="grid grid-cols-3 gap-3">
        <button type="button" onclick="addBlock('activity')"
          class="type-pick-btn flex flex-col items-center gap-2 py-5 rounded-[1.5rem] bg-surface-container-lowest shadow-sm hover:shadow-md transition-all">
          <span class="w-11 h-11 rounded-full bg-[#dcae96]/20 flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-xl" translate="no" style="font-variation-settings:'FILL' 1;">place</span>
          </span>
          <span class="text-xs font-bold text-on-surface">Activity / Stay</span>
        </button>
        <button type="button" onclick="addBlock('protip')"
          class="type-pick-btn flex flex-col items-center gap-2 py-5 rounded-[1.5rem] bg-surface-container-lowest shadow-sm hover:shadow-md transition-all">
          <span class="w-11 h-11 rounded-full bg-[#f5e6d3]/60 flex items-center justify-center">
            <span class="material-symbols-outlined text-[#b07844] text-xl" translate="no" style="font-variation-settings:'FILL' 1;">lightbulb</span>
          </span>
          <span class="text-xs font-bold text-on-surface">Pro Tip</span>
        </button>
        <button type="button" onclick="addBlock('location')"
          class="type-pick-btn flex flex-col items-center gap-2 py-5 rounded-[1.5rem] bg-surface-container-lowest shadow-sm hover:shadow-md transition-all">
          <span class="w-11 h-11 rounded-full bg-[#c9e6d7]/40 flex items-center justify-center">
            <span class="material-symbols-outlined text-[#334c41] text-xl" translate="no" style="font-variation-settings:'FILL' 1;">map</span>
          </span>
          <span class="text-xs font-bold text-on-surface">Location Pin</span>
        </button>
      </div>
    </div>

    <!-- Save + Discard -->
    <div class="pt-2 space-y-3">
      <button id="save-btn" type="button" onclick="saveAllEntries()"
        class="peach-gradient w-full py-5 rounded-full text-white font-headline font-bold text-lg shadow-lg hover:opacity-90 transition-all active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-40"
        disabled>
        <span class="material-symbols-outlined" translate="no">check_circle</span>
        <span id="save-label">Save to Journal</span>
      </button>
      <a href="journal.html"
        class="w-full py-4 rounded-full border border-outline-variant/30 text-on-surface-variant font-semibold hover:bg-surface-container transition-colors flex items-center justify-center">
        Discard
      </a>
    </div>

  </div><!-- /panel-manual -->

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 px-4 pb-6 pt-2">
  <div class="bg-[#F2EDEA]/85 backdrop-blur-3xl rounded-[3rem] shadow-[0_12px_40px_rgba(52,50,47,0.06)] flex justify-around items-center px-2 py-2">
    <a href="explore.html" class="nav-item"><span class="material-symbols-outlined" translate="no">travel_explore</span><span>Explore</span></a>
    <a href="trips.html" class="nav-item active"><span class="material-symbols-outlined" translate="no" style="font-variation-settings:'FILL' 1;">book</span><span>Journal</span></a>
    <a href="saved.html" class="nav-item"><span class="material-symbols-outlined" translate="no">favorite</span><span>Saved</span></a>
    <a href="sync.html" class="nav-item"><span class="material-symbols-outlined" translate="no">sync</span><span>Sync</span></a>
    <a href="profile.html" class="nav-item"><span class="material-symbols-outlined" translate="no">person</span><span>Profile</span></a>
  </div>
</nav>

<script src="../assets/js/new-entry.js"></script>
</body>
</html>
