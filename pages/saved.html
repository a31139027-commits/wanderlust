<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wanderlust - Saved</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/tailwind.config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../assets/shared.css" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-family: 'Material Symbols Outlined' !important; }
</style>
</head>
<body class="bg-background font-body text-on-surface antialiased pb-36">

<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-[#FDF8F5]/95 backdrop-blur-xl">
  <div class="flex items-center justify-between px-6 py-4 max-w-3xl mx-auto">
    <a href="explore.html" class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container text-primary hover:bg-surface-container-high transition-colors">
      <span class="material-symbols-outlined" translate="no">arrow_back</span>
    </a>
    <span class="font-headline font-extrabold tracking-[0.2em] text-lg text-primary" translate="no">WANDERLUST</span>
    <div class="w-10"></div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 pt-8">

  <div class="mb-8">
    <h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-1">Saved Places</h2>
    <p class="text-on-surface-variant text-sm">Your saved spots, grouped by destination</p>
  </div>

  <!-- Dynamic grid -->
  <div id="saved-grid" class="grid grid-cols-1 md:grid-cols-12 gap-6"></div>

  <!-- Empty state -->
  <div id="saved-empty" class="hidden text-center py-16">
    <div class="text-6xl mb-4">🤍</div>
    <p class="font-headline font-bold text-xl text-on-surface mb-2">Nothing saved yet</p>
    <p class="text-on-surface-variant text-sm mb-6">Explore destinations and tap the heart to save places.</p>
    <a href="explore.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-primary text-white font-bold text-sm">
      <span class="material-symbols-outlined text-base" translate="no">travel_explore</span>
      Start Exploring
    </a>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 px-4 pb-6 pt-2">
  <div class="bg-[#F2EDEA]/85 backdrop-blur-3xl rounded-[3rem] shadow-[0_12px_40px_rgba(52,50,47,0.06)] flex justify-around items-center px-2 py-2">
    <a href="explore.html" class="nav-item"><span class="material-symbols-outlined" translate="no">travel_explore</span><span>Explore</span></a>
    <a href="trips.html" class="nav-item"><span class="material-symbols-outlined" translate="no">book</span><span>Journal</span></a>
    <a href="saved.html" class="nav-item active"><span class="material-symbols-outlined" translate="no">favorite</span><span>Saved</span></a>
    <a href="sync.html" class="nav-item"><span class="material-symbols-outlined" translate="no">sync</span><span>Sync</span></a>
    <a href="profile.html" class="nav-item"><span class="material-symbols-outlined" translate="no">person</span><span>Profile</span></a>
  </div>
</nav>

<script src="../assets/js/saved.js"></script>
</body>
</html>
