<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wanderlust - Join the Journey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/tailwind.config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../assets/shared.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 right-0 z-50 glass-nav">
<div class="flex items-center justify-between px-8 py-6 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<a class="flex items-center justify-center p-2 rounded-full hover:opacity-80 transition-opacity text-[#7A5642] scale-95 duration-200" href="login.html">
<span class="material-symbols-outlined">arrow_back</span>
</a>
</div>
<a class="font-['Plus_Jakarta_SANS'] font-bold tracking-tight text-lg font-extrabold tracking-[0.2em] text-[#7A5642]" href="../index.html">
                WANDERLUST
            </a>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
</header>
<main class="min-h-screen pt-24 pb-12 px-6 flex items-center justify-center">
<div class="w-full max-w-6xl gap-8 items-stretch">
<!-- Left Side: Editorial Image/Intro (Bento Section) -->
<!-- Right Side: Sign Up Form -->
<div class="flex flex-col justify-center lg:px-12">
<div class="max-w-md mx-auto w-full lg:mx-auto">
<div class="mb-12">
<h1 class="font-headline text-4xl lg:text-5xl font-bold text-on-surface mb-4 tracking-tight">Join the Journey</h1>
<p class="font-body text-on-surface-variant text-lg">Create your curated travel profile today.</p>
</div>
<form action="explore.html" class="space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="block font-label font-semibold text-sm text-on-surface-variant ml-4" for="full_name">Full Name</label>
<input class="w-full h-16 px-8 rounded-full border-none bg-surface-container focus:bg-surface-container-lowest focus:ring-0 transition-all duration-300 font-body text-on-surface placeholder:text-on-surface-variant/40 outline-none cloud-shadow" id="full_name" placeholder="Evelyn Thorne" type="text"/>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label font-semibold text-sm text-on-surface-variant ml-4" for="email">Email Address</label>
<input class="w-full h-16 px-8 rounded-full border-none bg-surface-container focus:bg-surface-container-lowest focus:ring-0 transition-all duration-300 font-body text-on-surface placeholder:text-on-surface-variant/40 outline-none cloud-shadow" id="email" placeholder="evelyn@curator.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block font-label font-semibold text-sm text-on-surface-variant ml-4" for="password">Password</label>
<div class="relative">
<input class="w-full h-16 px-8 rounded-full border-none bg-surface-container focus:bg-surface-container-lowest focus:ring-0 transition-all duration-300 font-body text-on-surface placeholder:text-on-surface-variant/40 outline-none cloud-shadow" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-6 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-4 px-4 py-2">
<div class="flex items-center h-6">
<input class="w-5 h-5 rounded-md border-none bg-surface-container text-primary focus:ring-primary/20 transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body text-sm text-on-surface-variant leading-relaxed" for="terms">
                                I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>, acknowledging my journey will be handled with care.
                            </label>
</div>
<!-- Sign Up Button -->
<div class="pt-4">
<button class="w-full h-16 rounded-full peach-gradient text-on-primary font-headline font-bold text-lg cloud-shadow hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                                Sign Up
                                <span class="material-symbols-outlined">north_east</span>
</button>
</div>
</form>
<div class="mt-12 text-center">
<p class="font-body text-on-surface-variant">
                            Already part of the expedition?
                            <a class="text-primary font-bold ml-2 hover:underline" href="login.html">Log In</a>
</p>
</div>
</div>
</div>
</div>
</main>
<!-- Global Footer -->
<footer class="w-full py-12 flex flex-col items-center gap-4 bg-transparent">
<div class="flex gap-8">
<a class="font-['Be_Vietnam_Pro'] text-sm text-[#34322F]/50 hover:text-[#7A5642] transition-colors" href="../index.html">App Map</a>
<a class="font-['Be_Vietnam_Pro'] text-sm text-[#34322F]/50 hover:text-[#7A5642] transition-colors" href="login.html">Log In</a>
<a class="font-['Be_Vietnam_Pro'] text-sm text-[#34322F]/50 hover:text-[#7A5642] transition-colors" href="forgot-password.html">Password Help</a>
</div>
<p class="font-['Be_Vietnam_Pro'] text-sm text-[#7A5642] dark:text-[#DCAE96]">© 2026 Wanderlust Curator Flow</p>
</footer>
</body></html>
