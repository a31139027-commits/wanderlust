<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wanderlust - My Trips</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/tailwind.config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="../assets/shared.css" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-family: 'Material Symbols Outlined' !important; }
</style>
</head>
<body class="bg-background font-body text-on-surface antialiased pb-36">

<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-[#FDF8F5]/95 backdrop-blur-xl">
  <div class="flex items-center justify-between px-6 py-4 max-w-3xl mx-auto">
    <a href="explore.html" class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-container text-primary hover:bg-surface-container-high transition-colors">
      <span class="material-symbols-outlined" translate="no">arrow_back</span>
    </a>
    <span class="font-headline font-extrabold tracking-[0.2em] text-lg text-primary" translate="no">WANDERLUST</span>
    <div class="w-10"></div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 pt-8">

  <div class="mb-8">
    <h2 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface mb-1">My Trips</h2>
    <p class="text-on-surface-variant text-sm">Manage your travel plans</p>
  </div>

  <!-- Create new trip button -->
  <a href="new-trip.html"
    class="flex items-center gap-4 rounded-[2rem] border-2 border-dashed border-primary/30 px-6 py-5 mb-8 hover:border-primary/60 hover:bg-primary/5 transition-all group">
    <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0 group-hover:bg-primary/20 transition-colors">
      <span class="material-symbols-outlined text-primary text-2xl" translate="no">add</span>
    </div>
    <div>
      <p class="font-bold text-on-surface">Plan a New Trip</p>
      <p class="text-xs text-on-surface-variant">Choose a destination and start your itinerary</p>
    </div>
  </a>

  <!-- Trips list -->
  <div id="trips-list" class="space-y-4"></div>

  <!-- Empty state -->
  <div id="trips-empty" class="hidden text-center py-16">
    <div class="text-6xl mb-4">🗺️</div>
    <p class="font-headline font-bold text-xl text-on-surface mb-2">No trips yet</p>
    <p class="text-on-surface-variant text-sm">Create your first trip to get started.</p>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 px-4 pb-6 pt-2">
  <div class="bg-[#F2EDEA]/85 backdrop-blur-3xl rounded-[3rem] shadow-[0_12px_40px_rgba(52,50,47,0.06)] flex justify-around items-center px-2 py-2">
    <a href="explore.html" class="nav-item"><span class="material-symbols-outlined" translate="no">travel_explore</span><span>Explore</span></a>
    <a href="trips.html" class="nav-item active"><span class="material-symbols-outlined" translate="no" style="font-variation-settings:'FILL' 1;">book</span><span>Journal</span></a>
    <a href="saved.html" class="nav-item"><span class="material-symbols-outlined" translate="no">favorite</span><span>Saved</span></a>
    <a href="sync.html" class="nav-item"><span class="material-symbols-outlined" translate="no">sync</span><span>Sync</span></a>
    <a href="profile.html" class="nav-item"><span class="material-symbols-outlined" translate="no">person</span><span>Profile</span></a>
  </div>
</nav>

<script src="../assets/js/trips.js"></script>
</body>
</html>
